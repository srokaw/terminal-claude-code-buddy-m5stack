[env:m5stack-core]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
build_flags = -DCORE_DEBUG_LEVEL=0
lib_deps =
    m5stack/M5Unified@^0.2.0
    bblanchon/ArduinoJson@^7.0.0

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -DUNIT_TEST
; Pure header-only modules are pulled in via #include from test files.
; Exclude the Arduino/M5-dependent translation units from the native build.
build_src_filter = -<*> -<main.cpp> -<buddy_coolS.cpp>
